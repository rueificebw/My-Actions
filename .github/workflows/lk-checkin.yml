name: LK 签到

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  lk-checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create config
        run: |
          cat > src/lk/config.yaml << 'EOF'
          lk:
            security_key: "${{ secrets.LK_SECURITY_KEY }}"
            username: "${{ secrets.LK_USERNAME }}"
            password: "${{ secrets.LK_PASSWORD }}"
          EOF

      - name: Run LK checkin
        run: python src/lk/lk_checkin.py
