name: WorkBuddy 签到

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  workBuddy-checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run WorkBuddy checkin
        env:
          AUTH_JSON: ${{ secrets.WORKBUDDY_AUTH_JSON }}
        run: python src/workBuddy/workBuddy_checkin.py
