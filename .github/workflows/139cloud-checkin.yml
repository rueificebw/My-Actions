name: 中国移动云盘 签到

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  cloud139-checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run 139 Cloud checkin
        env:
          CAPTURED_AUTH: ${{ secrets.CAPTURED_AUTH }}
        run: python src/139cloud/139cloud_checkin.py
